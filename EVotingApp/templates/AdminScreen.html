{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Admin Dashboard • E-Voting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap"
    rel="stylesheet">
</head>

<body class="page animate-fade-in">
  <div class="topbar glass">
    <div class="nav">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="text-accent-secondary"
          style="color:var(--accent-secondary)">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        E-Voting <span class="pill"
          style="background: rgba(139, 92, 246, 0.2); border-color: rgba(139, 92, 246, 0.4); color: var(--accent-secondary);">Admin
          Dashboard</span>
      </div>
      <div class="nav-links">
        <a href="{% url 'AddParty' %}">Add Party</a>
        <a href="{% url 'ViewParty' %}">View Parties</a>
        <a href="{% url 'ViewVotes' %}">View Votes</a>
        <a href="{% url 'index' %}" style="color: var(--danger);">Logout</a>
      </div>
    </div>
  </div>

  <div class="shell">
    <div class="glass-card"
      style="padding: 48px; position: relative; overflow: hidden; margin-bottom: 32px; border-color: rgba(139, 92, 246, 0.3);">
      <div style="position: relative; z-index: 2;">
        <h1
          style="font-size: 2.5rem; margin-bottom: 12px; font-weight: 800; display: inline-block; background: linear-gradient(135deg, var(--text-main) 0%, var(--accent-secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          Command Center</h1>
        <p class="muted" style="font-size: 1.1rem; max-width: 600px;">Manage electoral parties, monitor cryptographic
          vote ledgers, and oversee the election integrity in real-time.</p>
      </div>
      <div
        style="position: absolute; top: -50px; right: -50px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%); pointer-events: none; z-index: 1;">
      </div>
    </div>

    <div class="glass-card table-container" style="padding: 24px;">
      {{ data|safe }}
    </div>
  </div>

  <div class="footer">E-Voting System &bull; Secured by Blockchain</div>
</body>

</html>
