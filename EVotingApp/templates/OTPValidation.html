{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>OTP Validation • E-Voting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap"
    rel="stylesheet">
</head>

<body class="page animate-fade-in">
  <div class="topbar glass">
    <div class="nav">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="text-accent-primary"
          style="color:var(--accent-primary)">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        E-Voting <span class="pill">Secure</span>
      </div>
      <div class="nav-links">
        <a class="active" href="{% url 'CastVote' %}" style="box-shadow: inset 0 0 0 1px var(--accent-primary);">Cast
          your vote</a>
        <a href="{% url 'index' %}" style="color: var(--danger);">Logout</a>
      </div>
    </div>
  </div>

  <div class="shell" style="justify-content: center; padding-top: 64px;">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-icon"
          style="background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(14, 165, 233, 0.2)); border-color: rgba(16, 185, 129, 0.3); box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="color: var(--success);">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1>Two-Factor Verification</h1>
        <p class="muted">Enter the One-Time Password sent to your secure network.</p>
      </div>

      <div class="glass-card" style="padding: 40px; margin-top: 16px; border-color: rgba(16, 185, 129, 0.3);">
        <form name="f1" method="post" action={% url 'OTPAction' %}>
          {% csrf_token %}

          {% if data %}
          <div
            style="margin-bottom: 24px; padding: 16px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: var(--radius-sm); color: var(--success); font-weight: 500; text-align: center;">
            {{ data }}
          </div>
          {% endif %}

          <div class="stack">
            <div>
              <label for="otp" style="text-align: center;">Authenticity Token (OTP)</label>
              <input id="otp" type="text" name="otp" inputmode="numeric" required placeholder="XXXX"
                style="font-size: 2rem; text-align: center; letter-spacing: 0.25em; padding: 16px; border-color: rgba(16, 185, 129, 0.3);">
            </div>

            <div style="margin-top: 16px;">
              <button type="submit" class="btn btn-primary btn-full"
                style="background: linear-gradient(135deg, var(--success), var(--accent-primary)); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);">
                Unlock Blockchain Ballot
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="footer">E-Voting System &bull; Secured by Blockchain</div>
</body>

</html>
