{% load static %}
<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Admin Login • E-Voting</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="{% static 'style.css' %}">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap"
		rel="stylesheet">
</head>

<body class="page animate-fade-in">
	<div class="topbar glass">
		<div class="nav">
			<div class="brand">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
					stroke-linecap="round" stroke-linejoin="round" class="text-accent-secondary"
					style="color:var(--accent-secondary)">
					<polyline points="9 11 12 14 22 4"></polyline>
					<path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
				</svg>
				E-Voting <span class="pill"
					style="background: rgba(139, 92, 246, 0.2); border-color: rgba(139, 92, 246, 0.4); color: var(--accent-secondary);">Admin</span>
			</div>
			<div class="nav-links">
				<a href="{% url 'index' %}">Home</a>
				<a class="active" href="{% url 'Admin' %}"
					style="box-shadow: inset 0 0 0 1px var(--accent-secondary);">Admin</a>
				<a href="{% url 'Login' %}">Voter Login</a>
				<a href="{% url 'Register' %}">Register</a>
			</div>
		</div>
	</div>

	<div class="shell" style="justify-content: center; padding-top: 64px;">
		<div class="auth-container">
			<div class="auth-header">
				<div class="auth-icon"
					style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2)); box-shadow: 0 0 30px rgba(139, 92, 246, 0.2); border-color: rgba(139, 92, 246, 0.3);">
					<svg width="40" height="40" viewBox="0 0 24 24" fill="none" class="text-accent-secondary"
						style="color:var(--accent-secondary)" stroke="currentColor">
						<rect x="5" y="11" width="14" height="10" rx="2" stroke-width="2" />
						<path d="M12 15V17" stroke-width="2" stroke-linecap="round" />
						<circle cx="12" cy="8" r="3" stroke-width="2" />
						<path d="M12 8V11" stroke-width="2" stroke-linecap="round" />
					</svg>
				</div>
				<h1>Administrator Portal</h1>
				<p class="muted">Access management tools to oversee parties and votes</p>
			</div>

			<div class="glass-card" style="padding: 40px; margin-top: 16px;">
				<form name="f1" method="post" action={% url 'AdminLogin' %}>
					{% csrf_token %}
					<div class="stack">
						<div style="text-align: center; margin-bottom: 8px;">
							<h3 style="font-size: 1.5rem; margin: 0;">System Login</h3>
						</div>

						<div>
							<label for="username">Username</label>
							<input id="username" type="text" name="username" autocomplete="username"
								placeholder="Enter admin username" required
								style="border-color: rgba(139, 92, 246, 0.3);">
						</div>
						<div>
							<label for="password">Password</label>
							<input id="password" type="password" name="password" autocomplete="current-password"
								placeholder="Enter admin password" required
								style="border-color: rgba(139, 92, 246, 0.3);">
						</div>

						<div style="margin-top: 16px;">
							<button type="submit" class="btn btn-primary btn-full"
								style="background: linear-gradient(135deg, var(--accent-secondary), #EC4899); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);">Access
								Dashboard</button>
						</div>

						<div
							style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-glass);">
							<p class="muted" style="margin: 0; font-size: 0.95rem;"><a href="{% url 'index' %}"
									style="color: var(--accent-secondary);">← Back to Network Home</a></p>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>

	<div class="footer">E-Voting System &bull; Secured by Blockchain</div>

	<!-- Toast Notification -->
	<div class="toast-container">
		<div id="toast" class="toast">
			<svg id="toast-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
				stroke-width="2"></svg>
			<span id="toast-msg"></span>
		</div>
	</div>

	<script>
		const errorMessage = "{{ data|default:'' }}".trim();

		if (errorMessage && errorMessage !== "" && errorMessage !== "None" && errorMessage.includes("Invalid")) {
			showToast(errorMessage, "error");
		}

		function showToast(message, type = "error") {
			const toast = document.getElementById("toast");
			const icon = document.getElementById("toast-icon");
			const msg = document.getElementById("toast-msg");

			msg.textContent = message;

			if (type === "error") {
				toast.className = "toast toast-error show";
				icon.innerHTML = '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>';
				icon.style.color = "var(--danger)";
			} else if (type === "success") {
				toast.className = "toast toast-success show";
				icon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>';
				icon.style.color = "var(--success)";
			}

			setTimeout(() => {
				toast.classList.remove("show");
			}, 4000);
		}
	</script>
</body>

</html>
