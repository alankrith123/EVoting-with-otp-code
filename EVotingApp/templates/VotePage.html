{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Cast Your Vote • E-Voting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap"
    rel="stylesheet">
</head>

<body class="page animate-fade-in">
  <div class="topbar glass">
    <div class="nav">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="text-accent-primary"
          style="color:var(--accent-primary)">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        E-Voting <span class="pill">Voting Booth</span>
      </div>
      <div class="nav-links">
        <a class="active" href="{% url 'votepage' %}" style="box-shadow: inset 0 0 0 1px var(--accent-primary);">Cast
          your vote</a>
        <a href="{% url 'index' %}" style="color: var(--danger);">Logout</a>
      </div>
    </div>
  </div>

  <div class="shell">
    <div class="glass-card"
      style="padding: 40px; margin-bottom: 24px; border-color: rgba(16, 185, 129, 0.4); text-align: center;">
      <h1 style="font-size: 2rem; margin-bottom: 8px;">Official Election Ballot</h1>
      <p class="muted" style="margin: 0;">Review the candidates below and cast your anonymous, blockchain-secured vote.
      </p>
    </div>

    <!-- The table injected by views.py will be styled perfectly by .table-container and .table due to our style.css and views.py replacement -->
    <div class="glass-card table-container" style="padding: 24px;">
      {{ data|safe }}
    </div>
  </div>

  <div class="footer">E-Voting System &bull; Secured by Blockchain</div>
</body>

</html>
